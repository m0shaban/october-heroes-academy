<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أكاديمية أبطال أكتوبر | October Heroes Academy</title>
    <meta name="description" content="أكاديمية رياضية متخصصة في الرياضات القتالية في مدينة 6 أكتوبر — كاراتيه، كيك بوكسينج، كونغ فو، جمباز." />
    <!-- SPA redirect for GitHub Pages -->
    <script>
      // Redirect 404 back to the SPA with the path preserved
      (function() {
        var segmentCount = 0;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body>
    <p>جاري إعادة التوجيه... | Redirecting...</p>
  </body>
</html>
